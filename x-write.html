<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Write</title>
    <link rel="stylesheet" href="xstyle.css">
</head>
<body>
    <h1>X-Write</h1>
    <p>Welcome to X-Write!</p>
    <hr>
    <p>Simple and powerful text editing!</p>
    <button onclick="window.location.href='write.html'">Start Writing!</button>
    <hr>
    <p>Markdown Editing!</p>
    <button onclick="window.location.href='markdown.html'">Start Editing!</button>
    <hr>
    <p>Realtime HTML Editing with Preview!</p>
    <button onclick="window.location.href='html.html'">Start Editing!</button>
    <hr>
    <p>About Page</p>
    <button onclick="window.location.href='about.html'">About</button>
    <hr>
    <button onclick="window.location.href='index.html'">Back to Main Menu</button>
<script>
  // Wartet, bis die gesamte Seite komplett geladen ist
  window.addEventListener('load', function() {
    const preloader = document.getElementById('preloader');
    
    // Wartet extra 2 Sekunden (2000 Millisekunden), bevor der Loader ausgeblendet wird
    setTimeout(function() {
      preloader.classList.add('fade-out');
    }, 2000); 
  });
</script>
</body>
</html>
