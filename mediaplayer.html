<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>X-Player</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div id="preloader">
  <div class="loader-wrapper">
    <span class="loader-letter">L</span>
    <span class="loader-letter">o</span>
    <span class="loader-letter">a</span>
    <span class="loader-letter">d</span>
    <span class="loader-letter">i</span>
    <span class="loader-letter">n</span>
    <span class="loader-letter">g</span>

    <div class="loader-bg-1"></div>
    <div class="loader-bg-2"></div>

    <div class="loader"></div>
  </div>
</div>

    <h1>X-Player</h1>
    <input type="file" id="fileInput" accept="video/*, audio/*">
    <button id="clearBtn" disabled>Clear Media</button>
    <button onclick="window.location.href='index.html'">Back Home</button>
    <br><br>
    <video id="mediaPlayer" controls width="0" height="0"></video>
    <script>
        const fileInput = document.getElementById('fileInput');
        const clearBtn = document.getElementById('clearBtn');
        const mediaPlayer = document.getElementById('mediaPlayer');
        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                const fileURL = URL.createObjectURL(file);
                
                mediaPlayer.src = fileURL;
                mediaPlayer.width = 400;
                mediaPlayer.height = 300;
                
                clearBtn.disabled = false;
            }
        });
        clearBtn.addEventListener('click', () => {
            fileInput.value = '';
            mediaPlayer.src = '';
            mediaPlayer.removeAttribute('src');
            mediaPlayer.load();
            mediaPlayer.width = 0;
            mediaPlayer.height = 0;
            clearBtn.disabled = true;
        });
    </script>
<script>
  // Wartet, bis die gesamte Seite komplett geladen ist
  window.addEventListener('load', function() {
    const preloader = document.getElementById('preloader');
    
    // Wartet extra 2 Sekunden (2000 Millisekunden), bevor der Loader ausgeblendet wird
    setTimeout(function() {
      preloader.classList.add('fade-out');
    }, 2000); 
  });
</script>
</body>
</html>
