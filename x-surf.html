<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>X-Surf</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <div id="preloader">
  <div class="loader-wrapper">
    <span class="loader-letter">L</span>
    <span class="loader-letter">o</span>
    <span class="loader-letter">a</span>
    <span class="loader-letter">d</span>
    <span class="loader-letter">i</span>
    <span class="loader-letter">n</span>
    <span class="loader-letter">g</span>

    <div class="loader-bg-1"></div>
    <div class="loader-bg-2"></div>

    <div class="loader"></div>
  </div>
</div>
    <h1>X-Surf</h1>

    <form id="browserForm">
        <input type="text" id="urlInput" placeholder="Search with DuckDuckGo or enter URL" required size="50">
        <button type="submit">Open in New Tab</button>
        <button type="button" id="clearBtn" disabled>Clear Active Tab</button>
    </form>
    
    <br>

    <div id="tabButtonsContainer"></div>
    
    <br>

    <div id="tabWindowsContainer"></div>

    <br>
    <button onclick="window.location.href='index.html'">Back to Home</button>
    <script>
        const browserForm = document.getElementById('browserForm');
        const urlInput = document.getElementById('urlInput');
        const clearBtn = document.getElementById('clearBtn');
        const tabButtonsContainer = document.getElementById('tabButtonsContainer');
        const tabWindowsContainer = document.getElementById('tabWindowsContainer');

        let tabs = [];
        let activeTabId = null;

        function renderTabs() {
            tabButtonsContainer.innerHTML = '';
            
            tabs.forEach(tab => {
                const btn = document.createElement('button');
                btn.innerText = tab.title;
                
                if (tab.id === activeTabId) {
                    btn.disabled = true; 
                }

                btn.addEventListener('click', () => switchTab(tab.id));
                tabButtonsContainer.appendChild(btn);

                const closeBtn = document.createElement('button');
                closeBtn.innerText = 'X';
                closeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    closeTab(tab.id);
                });
                tabButtonsContainer.appendChild(closeBtn);
                
                const space = document.createTextNode(' ');
                tabButtonsContainer.appendChild(space);
            });

            tabs.forEach(tab => {
                const iframe = document.getElementById(`iframe-${tab.id}`);
                if (tab.id === activeTabId && tab.src) {
                    iframe.width = "800";
                    iframe.height = "600";
                    iframe.style.display = "block";
                } else {
                    iframe.width = "0";
                    iframe.height = "0";
                    iframe.style.display = "none";
                }
            });

            const activeTab = tabs.find(t => t.id === activeTabId);
            clearBtn.disabled = !(activeTab && activeTab.src);
        }

        function switchTab(id) {
            activeTabId = id;
            renderTabs();
        }

        function closeTab(id) {
            const iframe = document.getElementById(`iframe-${id}`);
            if (iframe) iframe.remove();

            tabs = tabs.filter(tab => tab.id !== id);

            if (activeTabId === id) {
                activeTabId = tabs.length > 0 ? tabs[tabs.length - 1].id : null;
            }

            renderTabs();
        }

        browserForm.addEventListener('submit', (event) => {
            event.preventDefault();
            const input = urlInput.value.trim();
            let targetUrl = '';

            const urlPattern = /^(https?:\/\/)?([\w\d-]+\.)+[\w\d-]+(\/[\w\d- ./?%&=]*)?$/i;
            const isUrl = urlPattern.test(input) || input.startsWith('localhost') || input.includes('://');

            if (isUrl) {
                targetUrl = input;
                if (!/^https?:\/\//i.test(targetUrl)) {
                    targetUrl = 'https://' + targetUrl;
                }
            } else {
                targetUrl = 'https://duckduckgo.com/?q=' + encodeURIComponent(input);
            }

            const tabId = Date.now();
            const shortTitle = input.length > 15 ? input.substring(0, 15) + '...' : input;

            const iframe = document.createElement('iframe');
            iframe.id = `iframe-${tabId}`;
            iframe.src = targetUrl;
            iframe.frameBorder = "1";
            iframe.width = "0";
            iframe.height = "0";
            iframe.style.display = "none";
            tabWindowsContainer.appendChild(iframe);

            tabs.push({
                id: tabId,
                title: shortTitle,
                src: targetUrl
            });

            urlInput.value = '';
            activeTabId = tabId;
            renderTabs();
        });

        clearBtn.addEventListener('click', () => {
            const activeTab = tabs.find(t => t.id === activeTabId);
            if (activeTab) {
                const iframe = document.getElementById(`iframe-${activeTab.id}`);
                if (iframe) {
                    iframe.src = '';
                    iframe.removeAttribute('src');
                }
                activeTab.src = '';
                activeTab.title = 'Empty Tab';
                renderTabs();
            }
        });
    </script>
    <script>
  window.addEventListener('load', function() {
    const preloader = document.getElementById('preloader');
    setTimeout(function() {
      preloader.classList.add('fade-out');
    }, 2000); 
  });
</script>
</body>
</html>
